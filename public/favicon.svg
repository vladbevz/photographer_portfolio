<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="16" fill="#2A2520"/>
  <!-- 3 overlapping ellipses at 0°/60°/120° — creates classic 6-blade aperture -->
  <ellipse cx="16" cy="16" rx="3.8" ry="11" fill="#B89A73" transform="rotate(0 16 16)"/>
  <ellipse cx="16" cy="16" rx="3.8" ry="11" fill="#B89A73" transform="rotate(60 16 16)"/>
  <ellipse cx="16" cy="16" rx="3.8" ry="11" fill="#B89A73" transform="rotate(120 16 16)"/>
  <!-- Center hole (lens opening) -->
  <circle cx="16" cy="16" r="4.2" fill="#2A2520"/>
  <!-- Thin gold ring around the opening -->
  <circle cx="16" cy="16" r="4.2" fill="none" stroke="#B89A73" stroke-width="0.8"/>
  <!-- Outer ring for refinement -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#B89A73" stroke-width="0.6" opacity="0.4"/>
</svg>
