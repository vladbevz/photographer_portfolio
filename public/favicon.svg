<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Warm dark background -->
  <circle cx="16" cy="16" r="16" fill="#2A2520"/>

  <!-- Camera body -->
  <rect x="3.5" y="11" width="25" height="16" rx="2.5" stroke="#B89A73" stroke-width="1.4"/>

  <!-- Viewfinder bump (top, slightly left of center) -->
  <rect x="8.5" y="7" width="10" height="5" rx="2" stroke="#B89A73" stroke-width="1.4"/>

  <!-- Shutter button (top right) -->
  <circle cx="24" cy="9.5" r="1.8" stroke="#B89A73" stroke-width="1.2"/>

  <!-- Lens outer ring -->
  <circle cx="16" cy="19" r="5.8" stroke="#B89A73" stroke-width="1.4"/>

  <!-- Lens inner ring -->
  <circle cx="16" cy="19" r="3.2" stroke="#B89A73" stroke-width="1"/>

  <!-- Lens centre dot -->
  <circle cx="16" cy="19" r="1.2" fill="#B89A73"/>
</svg>
